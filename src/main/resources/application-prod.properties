# ============================================
# CONFIGURACIÓN PARA POSTGRESQL EN RENDER
# ============================================

# Puerto de Render (Render asigna automáticamente via variable PORT)
server.port=${PORT:8080}

# ===== CONEXIÓN A POSTGRESQL EN RENDER =====
# Se usan variables de entorno con valores por defecto (Hostname Interno)
# Esto permite que funcione sin configurar nada en Render, o que puedas
# sobrescribir los valores desde el Dashboard de Render si lo deseas.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://dpg-cu9p12tumphs73dvn9s0-a.oregon-postgres.render.com:5432/sistema_simple?sslmode=require}
spring.datasource.username=${DATABASE_USER:sistema_user}
spring.datasource.password=${DATABASE_PASSWORD:Fst9U8dNzTw6OCp1LdCd2Fxam8ksGrQo}

# ===== DRIVER POSTGRESQL =====
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA/HIBERNATE PARA POSTGRESQL =====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== POOL DE CONEXIONES (OPTIMIZADO PARA RENDER) =====
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000

# ===== THYMELEAF =====
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ===== LOGGING =====
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.com.example=INFO
logging.level.org.hibernate=ERROR

# ===== SERVER =====
server.compression.enabled=true

# ===== MANEJO DE ERRORES =====
server.error.whitelabel.enabled=false
server.error.path=/error
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=never
server.error.include-exception=false

# ===== MANEJO DE 404 =====
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ===== DESHABILITAR H2 COMPLETAMENTE =====
spring.h2.console.enabled=false

# ===== ARCHIVOS ESTÁTICOS (para carrusel) =====
spring.web.resources.static-locations=classpath:/static/,file:./uploads/

# ===== MULTIPART (para subir imágenes) =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

